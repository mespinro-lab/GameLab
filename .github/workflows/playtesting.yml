name: Automated Playtesting

on:
  push:
    branches: [main]
    paths:
      - 'src/life-tycoon/**'
      - 'design/life-tycoon-open-points.md'
  pull_request:
    branches: [main]
    paths:
      - 'src/life-tycoon/**'
      - 'design/life-tycoon-open-points.md'
  workflow_dispatch:
    inputs:
      sweep:
        description: 'Playtest sweep type'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - casual
          - dynasty
          - optimizer
          - new-player
          - speed-runner

concurrency:
  group: playtesting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: |
          if [ -d "tests/unit" ] && find tests/unit -name "*.js" | grep -q .; then
            node --test tests/unit/**/*.js
          else
            echo "No unit tests found — skipping (add tests to tests/unit/)"
          fi

  playtest:
    name: Playtest Sweep (${{ github.event.inputs.sweep || 'full' }})
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Set sweep type
        id: sweep
        run: |
          SWEEP="${{ github.event.inputs.sweep }}"
          echo "type=${SWEEP:-full}" >> "$GITHUB_OUTPUT"

      - name: Run /playtest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print "/playtest ${{ steps.sweep.outputs.type }}" \
            --output-format text \
            2>&1 | tee /tmp/claude-output.txt

      - name: Find generated report
        id: report
        run: |
          REPORT=$(find production/playtests -name "*.md" ! -name ".gitkeep" \
            -newer production/playtests/.gitkeep \
            -not -path "*/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]/*" \
            2>/dev/null | sort | tail -n 1)
          # Also check dated subdirectories
          if [ -z "$REPORT" ]; then
            REPORT=$(find production/playtests -name "*.md" ! -name ".gitkeep" \
              2>/dev/null | sort | tail -n 1)
          fi
          echo "path=${REPORT}" >> "$GITHUB_OUTPUT"
          echo "Found report: ${REPORT}"

      - name: Upload playtest report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playtest-${{ steps.sweep.outputs.type }}-${{ github.run_number }}
          path: production/playtests/
          if-no-files-found: warn
          retention-days: 90

      - name: Commit report to branch
        if: github.event_name == 'push' && steps.report.outputs.path != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add production/playtests/
          if git diff --cached --quiet; then
            echo "No new report to commit"
          else
            git commit -m "chore: playtest report [${{ steps.sweep.outputs.type }}] run #${{ github.run_number }}"
            git push
          fi

      - name: Post PR comment with summary
        if: github.event_name == 'pull_request' && steps.report.outputs.path != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '${{ steps.report.outputs.path }}';

            let body = '## Playtest Report\n\n';
            body += `**Sweep**: \`${{ steps.sweep.outputs.type }}\`\n`;
            body += `**Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n`;

            if (reportPath && fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              // Extract Summary and Critical sections only to keep comment concise
              const summaryMatch = report.match(/## Summary[\s\S]*?(?=## S1|## S2|## Design|## Open|## Recommended|$)/);
              const criticalMatch = report.match(/## S1[\s\S]*?(?=## S2|## Design|## Open|## Recommended|$)/);
              const actionsMatch = report.match(/## Recommended Next Actions[\s\S]*?(?=$)/);

              if (summaryMatch) body += summaryMatch[0] + '\n';
              if (criticalMatch && criticalMatch[0].trim() !== '## S1 — Critical (block release)') {
                body += criticalMatch[0] + '\n';
              }
              if (actionsMatch) body += actionsMatch[0] + '\n';
              body += `\n<details><summary>Full report</summary>\n\n\`\`\`\n${report}\n\`\`\`\n</details>`;
            } else {
              body += '_No report file found — check the workflow logs._\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail on S1 issues
        if: steps.report.outputs.path != ''
        run: |
          REPORT="${{ steps.report.outputs.path }}"
          if [ -f "$REPORT" ] && grep -q "## S1 — Critical" "$REPORT"; then
            # Check if the S1 section has actual content (not just the header)
            S1_CONTENT=$(awk '/## S1 — Critical/,/## S2/' "$REPORT" | grep -v "^##" | grep -v "^$")
            if [ -n "$S1_CONTENT" ]; then
              echo "::error::S1 Critical issues found in playtest report. Review required before merge."
              echo "$S1_CONTENT"
              exit 1
            fi
          fi
          echo "No S1 Critical issues — playtest passed."
