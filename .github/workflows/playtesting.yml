name: Automated Playtesting

on:
  schedule:
    - cron: '0 22 * * *'
  push:
    branches: [main]
    paths:
      - 'prototypes/life-tycoon-2/**'
  pull_request:
    branches: [main]
    paths:
      - 'prototypes/life-tycoon-2/**'
  workflow_dispatch:
    inputs:
      sweep:
        description: 'Playtest sweep type'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - casual
          - dynasty
          - optimizer
          - new-player
          - speed-runner
          - tycoon
          - historian

concurrency:
  group: playtesting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run unit tests
        run: |
          if [ -d "tests/unit" ] && find tests/unit -name "*.js" | grep -q .; then
            node --test tests/unit/**/*.js
          else
            echo "No unit tests found — skipping (add tests to tests/unit/)"
          fi

  playtest:
    name: Playtest Sweep (${{ github.event.inputs.sweep || 'full' }})
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Set sweep type
        id: sweep
        run: |
          SWEEP="${{ github.event.inputs.sweep }}"
          echo "type=${SWEEP:-full}" >> "$GITHUB_OUTPUT"

      - name: Run playtesting agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/playtest-ci.js

      - name: Find generated report
        id: report
        run: |
          REPORT=$(find production/playtests -name "*.md" ! -name ".gitkeep" \
            -newer production/playtests/.gitkeep \
            -not -path "*/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]/*" \
            2>/dev/null | sort | tail -n 1)
          # Also check dated subdirectories
          if [ -z "$REPORT" ]; then
            REPORT=$(find production/playtests -name "*.md" ! -name ".gitkeep" \
              2>/dev/null | sort | tail -n 1)
          fi
          echo "path=${REPORT}" >> "$GITHUB_OUTPUT"
          echo "Found report: ${REPORT}"

      - name: Upload playtest report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playtest-${{ steps.sweep.outputs.type }}-${{ github.run_number }}
          path: production/playtests/
          if-no-files-found: warn
          retention-days: 90

      - name: Commit report to branch
        if: github.event_name == 'push' && steps.report.outputs.path != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add production/playtests/
          if git diff --cached --quiet; then
            echo "No new report to commit"
          else
            git commit -m "chore: playtest report [${{ steps.sweep.outputs.type }}] run #${{ github.run_number }}"
            git push
          fi

      - name: Post PR comment with summary
        if: github.event_name == 'pull_request' && steps.report.outputs.path != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '${{ steps.report.outputs.path }}';

            let body = '## Playtest Report\n\n';
            body += `**Sweep**: \`${{ steps.sweep.outputs.type }}\`\n`;
            body += `**Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n`;

            if (reportPath && fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              // Extract Summary and Critical sections only to keep comment concise
              const summaryMatch = report.match(/## Summary[\s\S]*?(?=## S1|## S2|## Design|## Open|## Recommended|$)/);
              const criticalMatch = report.match(/## S1[\s\S]*?(?=## S2|## Design|## Open|## Recommended|$)/);
              const actionsMatch = report.match(/## Recommended Next Actions[\s\S]*?(?=$)/);

              if (summaryMatch) body += summaryMatch[0] + '\n';
              if (criticalMatch && criticalMatch[0].trim() !== '## S1 — Critical (block release)') {
                body += criticalMatch[0] + '\n';
              }
              if (actionsMatch) body += actionsMatch[0] + '\n';
              body += `\n<details><summary>Full report</summary>\n\n\`\`\`\n${report}\n\`\`\`\n</details>`;
            } else {
              body += '_No report file found — check the workflow logs._\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail on S1 issues
        if: steps.report.outputs.path != ''
        run: |
          REPORT="${{ steps.report.outputs.path }}"
          if [ -f "$REPORT" ] && grep -q "## S1 — Critical" "$REPORT"; then
            # Check if the S1 section has actual content (not just the header)
            S1_CONTENT=$(awk '/## S1 — Critical/,/## S2/' "$REPORT" | grep -v "^##" | grep -v "^$")
            if [ -n "$S1_CONTENT" ]; then
              echo "::error::S1 Critical issues found in playtest report. Review required before merge."
              echo "$S1_CONTENT"
              exit 1
            fi
          fi
          echo "No S1 Critical issues — playtest passed."

      - name: Build Catalan email summary
        if: always()
        id: email
        run: |
          REPORT="${{ steps.report.outputs.path }}"
          SWEEP="${{ steps.sweep.outputs.type }}"
          DATE=$(date +'%d/%m/%Y')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="${{ job.status }}"

          # Translate status to Catalan
          case "$STATUS" in
            success) STATUS_CA="✅ Correcte" ;;
            failure) STATUS_CA="❌ Fallit" ;;
            cancelled) STATUS_CA="⚠️ Cancel·lat" ;;
            *)        STATUS_CA="⚠️ Desconegut" ;;
          esac

          # Translate sweep type to Catalan
          case "$SWEEP" in
            full)       SWEEP_CA="Completa (tots els agents)" ;;
            casual)     SWEEP_CA="Jugador casual mòbil" ;;
            dynasty)    SWEEP_CA="Constructor de dinastia" ;;
            optimizer)  SWEEP_CA="Optimitzador / caça-exploits" ;;
            new-player) SWEEP_CA="Jugador nou" ;;
            speed-runner) SWEEP_CA="Corredor de velocitat" ;;
            tycoon)     SWEEP_CA="Auditor de codi font" ;;
            historian)  SWEEP_CA="Anàlisi històrica de sessions" ;;
            *)          SWEEP_CA="$SWEEP" ;;
          esac

          # Extract issue counts and recommended actions from report
          S1_COUNT=0; S2_COUNT=0; S3_COUNT=0; S4_COUNT=0
          NEXT_ACTIONS="(sense informe disponible)"
          CRITICAL_DETAIL=""

          if [ -f "$REPORT" ]; then
            S1_COUNT=$(grep -c "^- \*\*ID\*\*:" "$REPORT" 2>/dev/null || true)
            # Rough per-severity counts from summary line
            SUMMARY_LINE=$(grep "S1:" "$REPORT" | head -1)
            S1_COUNT=$(echo "$SUMMARY_LINE" | grep -oP 'S1: \K[0-9]+' || echo 0)
            S2_COUNT=$(echo "$SUMMARY_LINE" | grep -oP 'S2: \K[0-9]+' || echo 0)
            S3_COUNT=$(echo "$SUMMARY_LINE" | grep -oP 'S3: \K[0-9]+' || echo 0)
            S4_COUNT=$(echo "$SUMMARY_LINE" | grep -oP 'S4: \K[0-9]+' || echo 0)
            NEXT_ACTIONS=$(awk '/## Recommended Next Actions/,/^## /' "$REPORT" \
              | grep -v "^##" | head -6 | sed 's/^/  /' || echo "  (no disponible)")
            CRITICAL_DETAIL=$(awk '/## S1 — Critical/,/## S2/' "$REPORT" \
              | grep -v "^##" | grep -v "^$" | head -10 | sed 's/^/  /' || true)
          fi

          # Build plain-text body
          BODY="Informe de playtest automatitzat — Life Tycoon
          ================================================

          Data:   $DATE
          Estat:  $STATUS_CA
          Tipus:  $SWEEP_CA
          Execució: $RUN_URL

          RESUM D'INCIDÈNCIES
          -------------------
          S1 Crítiques (bloquegen publicació): $S1_COUNT
          S2 Importants (cal corregir abans del fita): $S2_COUNT
          S3 Menors (corregir quan hi hagi capacitat): $S3_COUNT
          S4 Trivials (backlog de poliment): $S4_COUNT"

          if [ -n "$CRITICAL_DETAIL" ]; then
            BODY="$BODY

          PROBLEMES CRÍTICS (S1)
          ----------------------
          $CRITICAL_DETAIL"
          fi

          BODY="$BODY

          PROPERES ACCIONS RECOMANADES
          ----------------------------
          $NEXT_ACTIONS

          ================================================
          Generat automàticament per Claude Code Game Studios.
          Repositori: ${{ github.repository }}"

          # Write to file so the mail action can read it
          echo "$BODY" > /tmp/email-body.txt
          echo "body_path=/tmp/email-body.txt" >> "$GITHUB_OUTPUT"

          # Subject line
          if [ "$S1_COUNT" -gt 0 ] 2>/dev/null; then
            SUBJECT="🔴 [Life Tycoon] Playtest $DATE — $S1_COUNT problema(es) crític(s) detectat(s)"
          elif [ "$STATUS" != "success" ]; then
            SUBJECT="⚠️ [Life Tycoon] Playtest $DATE — execució fallida"
          else
            SUBJECT="✅ [Life Tycoon] Playtest $DATE — cap problema crític"
          fi
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"

      - name: Send Catalan email summary
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT || 465 }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: "Claude Code Game Studios <${{ secrets.MAIL_USERNAME }}>"
          subject: ${{ steps.email.outputs.subject }}
          body: file:///tmp/email-body.txt
