name: Deploy GameLab to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - 'prototypes/life-tycoon-2/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build pages
        run: |
          mkdir -p dist/life-tycoon-2
          cp pages/index.html dist/
          cp prototypes/life-tycoon-2/index.html  dist/life-tycoon-2/
          cp prototypes/life-tycoon-2/style.css    dist/life-tycoon-2/
          cp prototypes/life-tycoon-2/data.js      dist/life-tycoon-2/
          cp prototypes/life-tycoon-2/game.js      dist/life-tycoon-2/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - uses: actions/deploy-pages@v4
        id: deployment
