name: Visual QA

on:
  schedule:
    - cron: '0 22 * * *'
  push:
    branches: [main]
    paths:
      - 'src/life-tycoon/**'
      - 'tests/visual-qa/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/life-tycoon/**'
      - 'tests/visual-qa/**'
  workflow_dispatch:

concurrency:
  group: visual-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-qa:
    name: Visual QA — Playwright + Claude Vision
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Create output directories
        run: mkdir -p production/playtests test-results

      - name: Run visual QA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CI: true
        run: npx playwright test tests/visual-qa/ --config tests/visual-qa/playwright.config.js

      - name: Print test results summary
        if: always()
        run: |
          REPORT="production/playtests/visual-qa-results.json"
          if [ -f "$REPORT" ]; then
            node -e "
              const r = require('./${REPORT}');
              const counts = { passed:0, failed:0, skipped:0 };
              const failures = [];
              (r.suites||[]).forEach(s=>(s.suites||[]).forEach(p=>(p.specs||[]).forEach(sp=>(sp.tests||[]).forEach(t=>{
                const st = t.results?.[0]?.status;
                if (st==='passed') counts.passed++;
                else if (st==='skipped') counts.skipped++;
                else { counts.failed++; failures.push(p.title+' > '+sp.title+': '+(t.results?.[0]?.error?.message||'').split('\n')[0]); }
              }))));
              console.log('Results: '+JSON.stringify(counts));
              failures.forEach(f=>console.log('FAIL: '+f));
            "
          else
            echo "No results file found."
          fi

      - name: Upload screenshots and results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-qa-${{ github.run_number }}
          path: |
            production/playtests/visual-qa-results.json
            test-results/
          if-no-files-found: warn
          retention-days: 30

      - name: Build email summary
        if: always()
        id: email
        run: |
          REPORT="production/playtests/visual-qa-results.json"
          DATE=$(date +'%d/%m/%Y')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="${{ job.status }}"

          case "$STATUS" in
            success) STATUS_CA="✅ Correcte" ;;
            failure) STATUS_CA="❌ Fallit" ;;
            cancelled) STATUS_CA="⚠️ Cancel·lat" ;;
            *)        STATUS_CA="⚠️ Desconegut" ;;
          esac

          PASSED=0; FAILED=0; SKIPPED=0
          FAILURES_DETAIL=""

          if [ -f "$REPORT" ]; then
            PASSED=$(node -e "
              const r=require('./${REPORT}');
              let n=0;
              (r.suites||[]).forEach(s=>(s.suites||[]).forEach(p=>(p.specs||[]).forEach(sp=>(sp.tests||[]).forEach(t=>{ if(t.results?.[0]?.status==='passed') n++; }))));
              console.log(n);
            " 2>/dev/null || echo 0)
            FAILED=$(node -e "
              const r=require('./${REPORT}');
              let n=0;
              (r.suites||[]).forEach(s=>(s.suites||[]).forEach(p=>(p.specs||[]).forEach(sp=>(sp.tests||[]).forEach(t=>{ const st=t.results?.[0]?.status; if(st!=='passed'&&st!=='skipped') n++; }))));
              console.log(n);
            " 2>/dev/null || echo 0)
            SKIPPED=$(node -e "
              const r=require('./${REPORT}');
              let n=0;
              (r.suites||[]).forEach(s=>(s.suites||[]).forEach(p=>(p.specs||[]).forEach(sp=>(sp.tests||[]).forEach(t=>{ if(t.results?.[0]?.status==='skipped') n++; }))));
              console.log(n);
            " 2>/dev/null || echo 0)
            FAILURES_DETAIL=$(node -e "
              const r=require('./${REPORT}');
              const lines=[];
              (r.suites||[]).forEach(s=>(s.suites||[]).forEach(p=>(p.specs||[]).forEach(sp=>(sp.tests||[]).forEach(t=>{
                const st=t.results?.[0]?.status;
                if(st!=='passed'&&st!=='skipped') lines.push('  - '+p.title+' > '+sp.title+': '+(t.results?.[0]?.error?.message||'').split('\n')[0]);
              }))));
              console.log(lines.join('\n'));
            " 2>/dev/null || true)
          fi

          BODY="Informe de Visual QA automatitzat — Life Tycoon
          ================================================

          Data:     $DATE
          Estat:    $STATUS_CA
          Execució: $RUN_URL

          RESUM DE PROVES
          ---------------
          Passades: $PASSED
          Fallades: $FAILED
          Omeses:   $SKIPPED"

          if [ -n "$FAILURES_DETAIL" ]; then
            BODY="$BODY

          PROVES FALLADES
          ---------------
          $FAILURES_DETAIL"
          fi

          BODY="$BODY

          ================================================
          Generat automàticament per Claude Code Game Studios.
          Repositori: ${{ github.repository }}"

          echo "$BODY" > /tmp/vqa-email-body.txt
          echo "body_path=/tmp/vqa-email-body.txt" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -gt 0 ] 2>/dev/null; then
            SUBJECT="❌ [Life Tycoon] Visual QA $DATE — $FAILED prova(es) fallida(es)"
          elif [ "$STATUS" != "success" ]; then
            SUBJECT="⚠️ [Life Tycoon] Visual QA $DATE — execució fallida"
          else
            SUBJECT="✅ [Life Tycoon] Visual QA $DATE — totes les proves han passat"
          fi
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"

      - name: Send email summary
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT || 465 }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: "Claude Code Game Studios <${{ secrets.MAIL_USERNAME }}>"
          subject: ${{ steps.email.outputs.subject }}
          body: file:///tmp/vqa-email-body.txt

      - name: Post PR comment with findings
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'production/playtests/visual-qa-results.json';

            let body = '## Visual QA — Playwright + Claude Vision\n\n';
            body += `**Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n`;

            if (fs.existsSync(resultsPath)) {
              const raw = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const suites = raw.suites ?? [];
              let passed = 0, failed = 0, skipped = 0;
              const failures = [];

              for (const suite of suites) {
                for (const project of (suite.suites ?? [])) {
                  for (const spec of (project.specs ?? [])) {
                    for (const test of (spec.tests ?? [])) {
                      const status = test.results?.[0]?.status;
                      if (status === 'passed') passed++;
                      else if (status === 'skipped') skipped++;
                      else {
                        failed++;
                        const err = test.results?.[0]?.error?.message ?? '(no message)';
                        failures.push(`- **${spec.title}** (${project.title}): ${err.split('\n')[0]}`);
                      }
                    }
                  }
                }
              }

              const icon = failed > 0 ? '❌' : '✅';
              body += `${icon} **${passed} passed · ${failed} failed · ${skipped} skipped**\n\n`;
              if (failures.length > 0) {
                body += '### Failures\n' + failures.join('\n') + '\n\n';
              }
              body += '_Screenshots attached as workflow artifact._';
            } else {
              body += '_No results file found — check workflow logs._';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
